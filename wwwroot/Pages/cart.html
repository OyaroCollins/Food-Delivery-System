<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Celtics Restaurant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .cart-item {
            background: #007BFF; /* Blue background for food items */
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            color: white; /* Ensure text is visible on the blue background */
        }

        .cart-item-details {
            flex: 1;
            padding-left: 20px;
        }

            .cart-item-details h3 {
                margin: 0;
            }

            .cart-item-details p {
                margin: 5px 0;
            }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

            .quantity-button:hover {
                background-color: #003d82;
            }

        .remove-item {
            background-color: red;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

            .remove-item:hover {
                background-color: darkred;
            }

        .cart-summary {
            background-color: #007BFF;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }

            .cart-summary p {
                margin: 10px 0;
            }

        .checkout-button {
            background-color: green;
            color: white;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

            .checkout-button:hover {
                background-color: darkgreen;
            }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 90%;
            }

            .cart-item img {
                width: 80px;
                height: 60px;
            }

            .cart-summary {
                font-size: 14px;
            }

            .checkout-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Your Cart</h2>

        <div class="cart-items" id="cartItems">
            <!-- Cart items will be dynamically loaded here -->
        </div>

        <div class="cart-summary" id="cartSummary">
            <!-- Cart summary will be dynamically loaded here -->
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadCart();
        });

        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            if (cart.length === 0) {
                document.getElementById("cartItems").innerHTML = "<p>Your cart is empty!</p>";
                document.getElementById("cartSummary").innerHTML = "";
                return;
            }

            const cartItemsContainer = document.getElementById("cartItems");
            const cartSummaryContainer = document.getElementById("cartSummary");

            cartItemsContainer.innerHTML = ""; // Clear the cart items section

            let total = 0;

            cart.forEach(item => {
                const cartItem = document.createElement("div");
                cartItem.classList.add("cart-item");

                cartItem.innerHTML = `
                                <div class="cart-item-details">
                                    <h3>${item.name}</h3>
                                    <p>Price: KES ${item.price}</p>
                                    <div class="quantity-controls">
                                        <button class="quantity-button" onclick="changeQuantity('${item.id}', 'decrease')">-</button>
                                        <p>Quantity: ${item.quantity}</p>
                                        <button class="quantity-button" onclick="changeQuantity('${item.id}', 'increase')">+</button>
                                    </div>
                                </div>
                                <button class="remove-item" onclick="removeFromCart('${item.id}')">Remove</button>
                            `;

                cartItemsContainer.appendChild(cartItem);

                total += item.price * item.quantity;
            });

            cartSummaryContainer.innerHTML = `
                            <p><strong>Total:</strong> KES ${total}</p>
                            <button class="checkout-button" onclick="checkout()">Proceed to Checkout</button>
                        `;
        }

        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem("cart", JSON.stringify(cart));

            loadCart(); // Reload cart after removal
        }

        function changeQuantity(id, action) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const item = cart.find(item => item.id === id);

            if (action === 'increase') {
                item.quantity += 1;
            } else if (action === 'decrease' && item.quantity > 1) {
                item.quantity -= 1;
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart(); // Reload cart after quantity change
        }

        function checkout() {
            if (localStorage.getItem("isLoggedIn")) {
                window.location.href = "checkout.html"; // Redirect to checkout page
            } else {
                alert("Please log in to proceed with your order.");
                window.location.href = "login.html"; // Redirect to login page
            }
        }
    </script>

</body>
</html>
