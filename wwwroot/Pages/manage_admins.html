<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Admins | Celtics Restaurant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background-color: #003366;
            padding: 30px 15px;
            color: white;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

            .sidebar .admin-name {
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 30px;
                text-align: center;
            }

            .sidebar a {
                display: block;
                padding: 12px 15px;
                color: white;
                text-decoration: none;
                font-size: 18px;
                margin-bottom: 20px;
                border-radius: 5px;
                transition: background 0.3s ease;
            }

                .sidebar a:hover {
                    background-color: #007BFF;
                }

            .sidebar .logout {
                background-color: #FF0000;
                color: white;
                padding: 12px 25px;
                font-size: 18px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                width: 100%;
                margin-top: 30px;
                text-align: center;
                transition: background 0.3s ease;
            }

                .sidebar .logout:hover {
                    background-color: #cc0000;
                }

        /* Main content area */
        .main-content {
            margin-left: 250px;
            width: calc(100% - 250px);
            padding: 30px;
        }

        .navbar {
            background-color: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #003366;
            color: white;
        }

        .delete-btn {
            background-color: #FF0000;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

            .delete-btn:hover {
                background-color: #cc0000;
            }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetchAdmins();
        });

        function fetchAdmins() {
            fetch("http://localhost:5282/api/admin/admins")
                .then(response => response.json())
                .then(data => {
                    const adminList = document.getElementById("admin-list");
                    adminList.innerHTML = "";
                    data.forEach(admin => {
                        adminList.innerHTML += `
                                <tr>
                                    <td>${admin.id}</td>
                                    <td>${admin.name}</td>
                                    <td>${admin.email}</td>
                                    <td>${admin.phoneNumber}</td>
                                    <td><button class="delete-btn" onclick="deleteAdmin(${admin.id})">Delete</button></td>
                                </tr>
                            `;
                    });
                })
                .catch(error => console.error("Error fetching admins:", error));
        }

        function deleteAdmin(adminId) {
            if (confirm("Are you sure you want to delete this admin?")) {
                fetch(`http://localhost:5282/api/admin/admins/${adminId}`, {
                    method: "DELETE",
                })
                    .then(response => {
                        if (response.ok) {
                            alert("Admin deleted successfully!");
                            fetchAdmins();
                        } else {
                            alert("Failed to delete admin.");
                        }
                    })
                    .catch(error => console.error("Error deleting admin:", error));
            }
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("userEmail");
            localStorage.removeItem("userRole");
            localStorage.removeItem("userId");
            localStorage.removeItem("userName");
            window.location.href = "login.html"; // Redirect to login page
        }
    </script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <p class="admin-name" id="admin-name"></p>
        <a href="admin_dashboard.html">Dashboard</a>
        <a href="manage_orders.html">Manage Orders</a>
        <a href="manage_food_items.html">Manage Food Items</a>
        <a href="manage_customers.html">Manage Customers</a>
        <a href="manage_admins.html">Manage Admins</a>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <div class="navbar">Manage Admins</div>
        <div class="container">
            <h2>List of Admins</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-list">
                    <!-- Admins will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
