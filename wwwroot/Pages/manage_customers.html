<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customers | Celtics Restaurant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: #003366;
            padding: 30px 15px;
            color: white;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

            .sidebar .admin-name {
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 30px;
                text-align: center;
            }

            .sidebar a {
                display: block;
                padding: 12px 15px;
                color: white;
                text-decoration: none;
                font-size: 18px;
                margin-bottom: 20px;
                border-radius: 5px;
                transition: background 0.3s ease;
            }

                .sidebar a:hover {
                    background-color: #007BFF;
                }
            .sidebar .logout {
                background-color: #FF0000;
                color: white;
                padding: 12px 25px;
                font-size: 18px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                width: 100%;
                margin-top: 30px;
                text-align: center;
                transition: background 0.3s ease;
            }

                .sidebar .logout:hover {
                    background-color: #cc0000;
                }

        .main-content {
            margin-left: 250px;
            width: calc(100% - 250px);
            padding: 30px;
        }

        .navbar {
            background-color: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #007BFF;
            color: white;
        }

        .delete-btn {
            background-color: #FF0000;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

            .delete-btn:hover {
                background-color: #cc0000;
            }
        .delete-btn {
            background-color: #FF0000;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

            .delete-btn:hover {
                background-color: #cc0000;
            }
    </style>
</head>
<body>
    <div class="sidebar">
        <p class="admin-name" id="admin-name"></p>
        <a href="admin_dashboard.html">Dashboard</a>
        <a href="manage_orders.html">Manage Orders</a>
        <a href="manage_food_items.html">Manage Food Items</a>
        <a href="manage_customers.html">Manage Customers</a>
        <a href="manage_admins.html">Manage Admins</a>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="main-content">
        <div class="navbar">
            Manage Customers
        </div>
        <div class="container">
            <h2>Customer List</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="customer-list">
                    <!-- Customers will be dynamically inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
    window.onload = function () {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        const userRole = localStorage.getItem("userRole");
        const userName = localStorage.getItem("userName");

        if (isLoggedIn !== "true" || userRole !== "Admin") {
            window.location.href = "login.html";
            return;
        }

        document.getElementById("admin-name").textContent = `Admin - ${userName || "Unknown"}`;

        fetchCustomers();
    };

    function fetchCustomers() {
        fetch("http://localhost:5282/api/admin/customers")
            .then(response => response.json())
            .then(data => {
                const customerList = document.getElementById("customer-list");
                customerList.innerHTML = "";

                data.forEach(customer => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${customer.id}</td>
                        <td>${customer.name}</td>
                        <td>${customer.email}</td>
                        <td>${customer.phoneNumber}</td>
                        <td><button class="delete-btn" onclick="deleteCustomer(${customer.id})">Delete</button></td>
                    `;
                    customerList.appendChild(row);
                });
            })
            .catch(error => console.error("Error fetching customers:", error));
    }

    function deleteCustomer(id) {
        if (confirm("Are you sure you want to delete this customer?")) {
            fetch(`http://localhost:5282/api/admin/customers/${id}`, {
                method: "DELETE"
            })
            .then(response => {
                if (response.ok) {
                    alert("Customer deleted successfully");
                    fetchCustomers(); // Refresh list
                } else {
                    alert("Failed to delete customer");
                }
            })
            .catch(error => console.error("Error deleting customer:", error));
        }
        }
        function logout() {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("userEmail");
            localStorage.removeItem("userRole");
            localStorage.removeItem("userId");
            localStorage.removeItem("userName");
            window.location.href = "login.html"; // Redirect to login page
        }
    </script>
</body>
</html>
